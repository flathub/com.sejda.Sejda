base-version: '25.08'
base: org.electronjs.Electron2.BaseApp
command: sejda-pdf-desktop
finish-args:
  - --device=dri
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --persist=.
  - --persist=.sejda-desktop
  - --share=ipc
  - --share=network
  - --socket=cups
  - --socket=fallback-x11
  - --socket=wayland
id: com.sejda.Sejda
modules:
  - name: sejda-pdf-desktop
    build-commands:
      - install -D -m 755 post-install-setup.sh /app/bin/apply_extra
      - install -D -m 755 entrypoint.sh /app/bin/sejda-pdf-desktop
      - install -D -m 644 -t /app/share/applications/ ${FLATPAK_ID}.desktop
      - install -D -m 644 -t /app/share/icons/hicolor/scalable/apps/ ${FLATPAK_ID}.svg
      - install -D -m 644 -t /app/share/metainfo/ ${FLATPAK_ID}.metainfo.xml
    buildsystem: simple
    sources:
      - type: extra-data
        filename: sejda-pdf-desktop.deb
        only-arches:
          - x86_64
        sha256: 6ccb7ca28f618d204016d6ef7c588f755ed8f542cd6534e74bae75f47a827ca0
        size: 297048144
        url: https://downloads.sejda-cdn.com/sejda-desktop_7.9.6_amd64.deb
        x-checker-data:
          is-main-source: true
          type: html
          url-template: https://downloads.sejda-cdn.com/sejda-desktop_${version}_amd64.deb
          url: https://www.sejda.com/desktop
          version-pattern: sejda-desktop_([0-9]+\.[0-9]+\.[0-9]+)_amd64.deb
      - type: file
        path: com.sejda.Sejda.desktop
      - type: file
        path: com.sejda.Sejda.metainfo.xml
      - type: file
        path: com.sejda.Sejda.svg
      - type: file
        path: entrypoint.sh
      - type: script
        commands:
          - bsdtar -x -f sejda-pdf-desktop.deb data.tar.gz
          - bsdtar -x -f data.tar.gz --strip-components=3 opt/sejda-desktop/
          - rm data.tar.gz sejda-pdf-desktop.deb
        dest-filename: post-install-setup.sh
runtime-version: '25.08'
runtime: org.freedesktop.Platform
sdk: org.freedesktop.Sdk
separate-locales: false
tags:
  - proprietary
